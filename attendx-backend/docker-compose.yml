# docker-compose.yml

services:
  postgres:
    image: postgres:15-alpine
    container_name: attendx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: attendx_user
      POSTGRES_PASSWORD: attendx_pass
      POSTGRES_DB: attendx_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendx_user -d attendx_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - attendx_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: attendx_redis
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD="attendx_redis"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass attendx_redis_pass
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "attendx_redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - attendx_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attendx_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development # production for live
      - PORT=3000
      - HOST=0.0.0.0
      - DATABASE_URL=postgresql://attendx_user:attendx_pass@postgres:5432/attendx_db?schema=public
      - REDIS_URL=redis://:attendx_redis_pass@redis:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_EXPIRY=1h
      - JWT_REFRESH_EXPIRY=7d
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
      - BCRYPT_ROUNDS=10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./temp:/app/temp
    networks:
      - attendx_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  attendx_network:
    driver: bridge